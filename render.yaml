services:
  - type: web
    name: applications-shopify
    env: node
    plan: free
    buildCommand: npm install && npm run build && npm run setup
    startCommand: npm run start
    envVars:
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        generateValue: true
      - key: SHOPIFY_APP_URL
        sync: false
      - key: HOST
        sync: false
      - key: SCOPES
        value: write_products,read_products
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: shopify-db
          property: connectionString

databases:
  - name: shopify-db
    plan: free
